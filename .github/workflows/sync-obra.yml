name: Sync obra_data desde Drive

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: sync-obra
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Deps
        run: pip install -q openpyxl google-api-python-client google-auth
      - name: Generar obra_data.json
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
        run: python sync/build_obra_data.py
      - name: Publicar si cambió
        run: |
          git config user.name "sync-bot"
          git config user.email "actions@github.com"
          if ! git diff --quiet obra_data.json 2>/dev/null || [ -n "$(git status --porcelain obra_data.json)" ]; then
            git add obra_data.json
            git commit -m "data: obra_data.json $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main || true
            git push origin main
            echo "Publicado."
          else
            echo "Sin cambios."
          fi
